<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sysmart Manual</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #222;
    --sidebar: #1f2937;
    --sidebar-text: #ffffff;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #ffffff;
    --sidebar: #000000;
    --sidebar-text: #ffffff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: var(--sidebar);
    color: var(--sidebar-text);
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    margin: 0 0 20px;
}

.menu div {
    margin: 12px 0;
    cursor: pointer;
    font-size: 14px;
}

.menu div:hover {
    opacity: 0.8;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 20px;
    width: 100%;
}

h1 {
    margin-top: 0;
}

/* INPUT */
input {
    width: 100%;
    max-width: 500px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
}

/* CARD */
.card {
    background: var(--card);
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card:hover {
    transform: scale(1.01);
    transition: 0.2s;
}

/* BUTTON */
a {
    text-decoration: none;
    background: #2563eb;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
}

/* TOP INFO */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.toggle {
    cursor: pointer;
    background: #444;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📁 Sysmart</h2>

    <div class="menu">
        <div onclick="filtrarCategoria('')"><i class="fa fa-list"></i> Todos (<span id="total">0</span>)</div>
        <div onclick="filtrarCategoria('sql')"><i class="fa fa-database"></i> SQL</div>
        <div onclick="filtrarCategoria('windows')"><i class="fa fa-desktop"></i> Windows</div>
        <div onclick="filtrarCategoria('backup')"><i class="fa fa-box"></i> Backup</div>
        <div onclick="filtrarCategoria('rede')"><i class="fa fa-network-wired"></i> Rede</div>
    </div>

    <br>
    <div class="toggle" onclick="toggleDark()">🌙 Modo Escuro</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>📄 Manual Sysmart</h1>

<div class="topbar">
    <span>📚 Base de conhecimento do sistema</span>
</div>

<input type="text" id="busca" placeholder="🔎 Buscar relatório..." onkeyup="buscar()">

<div id="lista">Carregando PDFs...</div>

</div>

<script>

let arquivos = [];
let filtroAtual = "";

// normalizar texto
function normalizar(texto) {
    return texto.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
}

// categoria automática
function categoria(nome) {
    nome = nome.toLowerCase();
    if (nome.includes("sql")) return "sql";
    if (nome.includes("windows")) return "windows";
    if (nome.includes("backup")) return "backup";
    if (nome.includes("rede")) return "rede";
    return "outros";
}

// carregar PDFs do GitHub
async function carregar() {
    const url = "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/pdf";

    const res = await fetch(url);
    arquivos = await res.json();

    arquivos = arquivos.filter(f => f.name.endsWith(".pdf"));

    document.getElementById("total").innerText = arquivos.length;

    render(arquivos);
}

// renderizar lista
function render(lista, termo="") {
    let html = "";

    lista.forEach(f => {

        let nome = f.name.replace(".pdf", "");
        let cat = categoria(nome);

        if (termo && !normalizar(nome).includes(termo)) return;

        html += `
        <div class="card">
            <div>
                📄 ${nome}
                <small style="opacity:0.6;">(${cat})</small>
            </div>

            <a href="${f.download_url}" target="_blank">Download</a>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html || "Nenhum resultado encontrado";
}

// busca estilo Google
function buscar() {
    let t = normalizar(document.getElementById("busca").value);
    render(arquivos, t);
}

// filtro sidebar
function filtrarCategoria(cat) {
    filtroAtual = cat;

    if (!cat) {
        render(arquivos);
        return;
    }

    let filtrados = arquivos.filter(f =>
        categoria(f.name) === cat
    );

    render(filtrados);
}

// modo escuro
function toggleDark() {
    document.body.classList.toggle("dark");
}

carregar();

</script>

</body>
</html>
