<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sysmart Manual</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #f4f6f9;
    --card: white;
    --text: #222;
    --sidebar: #1f2937;
    --sidebar-text: white;
}

body.dark {
    --bg: #111827;
    --card: #1f2937;
    --text: white;
    --sidebar: #000;
    --sidebar-text: #fff;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    display: flex;
}

.sidebar {
    width: 220px;
    background: var(--sidebar);
    color: var(--sidebar-text);
    height: 100vh;
    padding: 20px;
    position: fixed;
}

.menu div {
    margin: 10px 0;
    cursor: pointer;
}

.main {
    margin-left: 240px;
    padding: 20px;
    width: 100%;
}

input {
    width: 100%;
    max-width: 500px;
    padding: 10px;
    margin-bottom: 10px;
}

.card {
    background: var(--card);
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

a {
    text-decoration: none;
    padding: 6px 10px;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    font-size: 13px;
}

h2.section {
    margin-top: 30px;
    border-left: 4px solid #2563eb;
    padding-left: 10px;
}

.toggle {
    cursor: pointer;
    padding: 6px 10px;
    background: #444;
    color: white;
    border-radius: 6px;
    display: inline-block;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>📁 Sysmart</h2>

    <div class="menu">
        <div onclick="filtrarTipo('todos')">📁 Todos</div>
        <div onclick="filtrarTipo('pdf')">📄 PDFs</div>
        <div onclick="filtrarTipo('script')">💻 Scripts</div>
        <div onclick="filtrarTipo('python')">🐍 Python</div>
    </div>

    <br>
    <div class="toggle" onclick="toggleDark()">🌙 Modo</div>
</div>

<div class="main">

<h1>📄 Manual Sysmart</h1>

<input type="text" id="busca" placeholder="🔎 Pesquisar..." onkeyup="buscar()">

<div id="conteudo">Carregando...</div>

</div>

<script>

let pdfs = [];
let scripts = [];
let projetosPython = [];
let filtro = "todos";

// carregar dados
async function carregar() {

    const pdfUrl = "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/pdf";
    const scriptUrl = "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/script";
    const pythonUrl = "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/projeto_em_python";

    const [pdfRes, scriptRes, pythonRes] = await Promise.all([
        fetch(pdfUrl),
        fetch(scriptUrl),
        fetch(pythonUrl)
    ]);

    pdfs = await pdfRes.json();
    scripts = await scriptRes.json();
    projetosPython = await pythonRes.json();

    render();
}

// render
function render() {

    let html = "";

    // PDFs
    if (filtro === "todos" || filtro === "pdf") {
        html += `<h2 class="section">📄 PDFs</h2>`;

        pdfs.forEach(f => {
            if (!f.name.endsWith(".pdf")) return;

            let nome = f.name.replace(".pdf", "");

            html += `
            <div class="card">
                <div>📄 ${nome}</div>
                <div style="display:flex; gap:8px;">
                    <a href="${f.download_url}" target="_blank">Download</a>
                    <a href="https://docs.google.com/gview?url=${encodeURIComponent(f.download_url)}&embedded=true" target="_blank">
                        Visualizar
                    </a>
                </div>
            </div>`;
        });
    }

    // Scripts
    if (filtro === "todos" || filtro === "script") {
        html += `<h2 class="section">💻 Scripts</h2>`;

        scripts.forEach(f => {

            html += `
            <div class="card">
                <div>💻 ${f.name}</div>
                <div style="display:flex; gap:8px;">
                    <a href="${f.download_url}" target="_blank">Download</a>
                </div>
            </div>`;
        });
    }

    // Python
    if (filtro === "todos" || filtro === "python") {
        html += `<h2 class="section">🐍 Projetos Python</h2>`;

        projetosPython.forEach(f => {

            html += `
            <div class="card">
                <div>🐍 ${f.name}</div>
                <div style="display:flex; gap:8px;">
                    <a href="${f.html_url}" target="_blank">Abrir</a>
                </div>
            </div>`;
        });
    }

    document.getElementById("conteudo").innerHTML = html;
}

// filtro sidebar
function filtrarTipo(tipo) {
    filtro = tipo;
    render();
}

// busca
function buscar() {
    let t = document.getElementById("busca").value.toLowerCase();

    let html = "";

    if (filtro === "todos" || filtro === "pdf") {
        html += `<h2 class="section">📄 PDFs</h2>`;

        pdfs
            .filter(f => f.name.toLowerCase().includes(t))
            .forEach(f => {

                let nome = f.name.replace(".pdf", "");

                html += `
                <div class="card">
                    <div>📄 ${nome}</div>
                    <div style="display:flex; gap:8px;">
                        <a href="${f.download_url}" target="_blank">Download</a>
                        <a href="https://docs.google.com/gview?url=${encodeURIComponent(f.download_url)}&embedded=true" target="_blank">
                            Visualizar
                        </a>
                    </div>
                </div>`;
            });
    }

    if (filtro === "todos" || filtro === "script") {
        html += `<h2 class="section">💻 Scripts</h2>`;

        scripts
            .filter(f => f.name.toLowerCase().includes(t))
            .forEach(f => {

                html += `
                <div class="card">
                    <div>💻 ${f.name}</div>
                    <div style="display:flex; gap:8px;">
                        <a href="${f.download_url}" target="_blank">Download</a>
                    </div>
                </div>`;
            });
    }

    if (filtro === "todos" || filtro === "python") {
        html += `<h2 class="section">🐍 Projetos Python</h2>`;

        projetosPython
            .filter(f => f.name.toLowerCase().includes(t))
            .forEach(f => {

                html += `
                <div class="card">
                    <div>🐍 ${f.name}</div>
                    <div style="display:flex; gap:8px;">
                        <a href="${f.html_url}" target="_blank">Abrir</a>
                    </div>
                </div>`;
            });
    }

    document.getElementById("conteudo").innerHTML = html;
}

// modo escuro
function toggleDark() {
    document.body.classList.toggle("dark");
}

carregar();

</script>

</body>
</html>
