<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sysmart Manual</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #f4f6f9;
    --card: white;
    --text: #222;
    --sidebar: #1f2937;
    --sidebar-text: white;
}

body.dark {
    --bg: #111827;
    --card: #1f2937;
    --text: white;
    --sidebar: #000;
    --sidebar-text: #fff;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: var(--sidebar);
    color: var(--sidebar-text);
    height: 100vh;
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    font-size: 18px;
}

.menu {
    margin-top: 20px;
}

.menu div {
    margin: 10px 0;
    cursor: pointer;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 20px;
    width: 100%;
}

input {
    width: 100%;
    max-width: 500px;
    padding: 10px;
    margin-bottom: 10px;
}

/* CARD */
.card {
    background: var(--card);
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BUTTON */
a {
    text-decoration: none;
    padding: 6px 10px;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    font-size: 13px;
}

/* DARK BUTTON */
.toggle {
    cursor: pointer;
    padding: 6px 10px;
    background: #444;
    color: white;
    border-radius: 6px;
    display: inline-block;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>📁 Sysmart</h2>

    <div class="menu">
        <div onclick="filtrarCategoria('')"><i class="fa fa-list"></i> Todos (<span id="total">0</span>)</div>
        <div onclick="filtrarCategoria('sql')"><i class="fa fa-database"></i> SQL</div>
        <div onclick="filtrarCategoria('windows')"><i class="fa fa-desktop"></i> Windows</div>
        <div onclick="filtrarCategoria('backup')"><i class="fa fa-box"></i> Backup</div>
        <div onclick="filtrarCategoria('rede')"><i class="fa fa-network-wired"></i> Rede</div>
    </div>

    <br>
    <div class="toggle" onclick="toggleDark()">🌙 Modo</div>
</div>

<div class="main">

<h1>📄 Manual Sysmart</h1>

<input type="text" id="busca" placeholder="🔎 Não hesite em pesquisar mais...." onkeyup="buscar()">

<div id="lista">Carregando...</div>

</div>

<script>

let arquivos = [];
let filtroAtual = "";

// categoria
function categoria(nome) {
    nome = nome.toLowerCase();
    if (nome.includes("sql")) return "sql";
    if (nome.includes("windows")) return "windows";
    if (nome.includes("backup")) return "backup";
    if (nome.includes("rede")) return "rede";
    return "outros";
}

// carregar arquivos
async function carregar() {
    const url = "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/pdf";

    const res = await fetch(url);
    arquivos = await res.json();

    atualizar();
}

// mostrar
function atualizar() {
    let lista = arquivos.filter(f => f.name.endsWith(".pdf"));

    if (filtroAtual) {
        lista = lista.filter(f => categoria(f.name) === filtroAtual);
    }

    document.getElementById("total").innerText = lista.length;

    let html = "";

    lista.forEach(f => {
        let nome = f.name.replace(".pdf", "");

        html += `
        <div class="card">
            <div>📄 ${nome}</div>
            <div style="display:flex; gap:8px;">
                <a href="${f.download_url}" target="_blank">Download</a>
                <a href="https://docs.google.com/gview?url=${encodeURIComponent(f.download_url)}&embedded=true" target="_blank">
                    Visualizar
                </a>
            </div>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
}

// busca tipo Google
function buscar() {
    let t = document.getElementById("busca").value.toLowerCase();

    let filtrado = arquivos.filter(f =>
        f.name.toLowerCase().includes(t)
    );

    let html = "";

    filtrado.forEach(f => {
        let nome = f.name.replace(".pdf", "");

        html += `
        <div class="card">
            <div>📄 ${nome}</div>
            <div style="display:flex; gap:8px;">
                <a href="${f.download_url}" target="_blank">Download</a>
                <a href="https://docs.google.com/gview?url=${encodeURIComponent(f.download_url)}&embedded=true" target="_blank">
                    Visualizar
                </a>
            </div>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
}

// filtro sidebar
function filtrarCategoria(cat) {
    filtroAtual = cat;
    atualizar();
}

// modo escuro
function toggleDark() {
    document.body.classList.toggle("dark");
}

carregar();

</script>

</body>
</html>
