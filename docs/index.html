<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manual Sysmart</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
    transition: 0.3s;
}

body.dark {
    background: #111827;
    color: white;
}

header {
    padding: 15px;
    background: #1f2937;
    color: white;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.card {
    background: white;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    transition: 0.2s;
}

body.dark .card {
    background: #1f2937;
}

.card:hover {
    transform: scale(1.01);
}

.badge {
    font-size: 12px;
    background: #ddd;
    padding: 3px 8px;
    border-radius: 5px;
    margin-left: 8px;
}

a {
    text-decoration: none;
    background: #2563eb;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>
    📄 Manual Sysmart
</header>

<div class="container">

<div class="topbar">
    <div id="total">Carregando...</div>
    <button onclick="toggleDark()">🌙 Modo</button>
</div>

<input type="text" id="busca" placeholder="🔎 Buscar relatório..." onkeyup="filtrar()">

<div id="lista">Carregando PDFs...</div>

</div>

<script>

let arquivos = [];

// remover acento simples
function normalizar(texto) {
    return texto.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
}

// categoria simples
function categoria(nome) {
    nome = nome.toLowerCase();
    if (nome.includes("sql")) return "SQL";
    if (nome.includes("windows")) return "Windows";
    if (nome.includes("backup")) return "Backup";
    if (nome.includes("rede")) return "Rede";
    return "Geral";
}

// carregar PDFs
async function carregar() {
    const url = "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/pdf";

    const res = await fetch(url);
    arquivos = await res.json();

    arquivos = arquivos.filter(f => f.name.endsWith(".pdf"));

    document.getElementById("total").innerText = "📊 Total: " + arquivos.length;

    render(arquivos);
}

// render
function render(lista, termo="") {
    let html = "";

    lista.forEach(f => {

        let nome = f.name.replace(".pdf", "");
        let cat = categoria(nome);

        // destaque busca
        if (termo) {
            let n = normalizar(nome);
            if (!n.includes(termo)) return;
        }

        html += `
        <div class="card">
            <div>
                📄 ${nome}
                <span class="badge">${cat}</span>
            </div>

            <a href="${f.download_url}" target="_blank">Download</a>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html || "Nenhum resultado";
}

// busca inteligente
function filtrar() {
    let t = normalizar(document.getElementById("busca").value);
    render(arquivos, t);
}

// dark mode com memória
function toggleDark() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("mode", "dark");
    } else {
        localStorage.setItem("mode", "light");
    }
}

// carregar preferência
if (localStorage.getItem("mode") === "dark") {
    document.body.classList.add("dark");
}

carregar();

</script>

</body>
</html>
