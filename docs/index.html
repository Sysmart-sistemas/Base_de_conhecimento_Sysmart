<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manual Sysmart</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

input {
    width: 100%;
    max-width: 400px;
    padding: 12px;
    margin: 20px auto;
    display: block;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.category {
    font-size: 12px;
    padding: 3px 8px;
    background: #e0e0e0;
    border-radius: 5px;
    margin-left: 10px;
}

a.button {
    background: #007bff;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 12px;
}

a.button:hover {
    background: #0056b3;
}
</style>

</head>

<body>

<h1>📄 Manual Sysmart</h1>

<input type="text" id="busca" placeholder="🔎 Buscar relatório..." onkeyup="filtrar()">

<div class="container" id="lista">Carregando...</div>

<script>

let arquivos = [];

// define categoria automaticamente pelo nome
function categoria(nome) {
    nome = nome.toLowerCase();

    if (nome.includes("sql")) return "SQL";
    if (nome.includes("windows")) return "Windows";
    if (nome.includes("backup")) return "Backup";
    if (nome.includes("rede")) return "Rede";

    return "Geral";
}

async function carregar() {
    const url = "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/pdf";

    const res = await fetch(url);
    arquivos = await res.json();

    arquivos.sort((a, b) => a.name.localeCompare(b.name));

    mostrar(arquivos);
}

function mostrar(lista) {
    let html = "";

    lista.forEach(file => {
        if (!file.name.endsWith(".pdf")) return;

        let nome = file.name.replace(".pdf", "");
        let cat = categoria(nome);

        html += `
        <div class="card">
            <div>
                📄 ${nome}
                <span class="category">${cat}</span>
            </div>

            <a class="button" href="${file.download_url}" target="_blank">Download</a>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
}

function filtrar() {
    let texto = document.getElementById("busca").value.toLowerCase();

    let filtrados = arquivos.filter(f =>
        f.name.toLowerCase().includes(texto)
    );

    mostrar(filtrados);
}

carregar();

</script>

</body>
</html>
