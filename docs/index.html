<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sysmart Manual</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --primary: #3b82f6;
    --border: #e2e8f0;
}

body.dark {
    --bg: #020617;
    --card: #0f172a;
    --text: #e2e8f0;
    --border: #1e293b;
}

* {
    box-sizing: border-box;
    margin: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* LAYOUT */
.container {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #020617;
    color: white;
    padding: 20px;
    transition: 0.3s;
}

.sidebar.collapsed {
    width: 70px;
}

.sidebar h2 {
    margin-bottom: 20px;
    font-size: 18px;
}

.sidebar.collapsed span {
    display: none;
}

.menu div {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.menu div:hover {
    background: #1e293b;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    background: var(--card);
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
}

.search-box {
    display: flex;
    align-items: center;
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 10px;
    gap: 8px;
    border: 1px solid var(--border);
}

.search-box input {
    border: none;
    outline: none;
    background: transparent;
}

/* CONTENT */
.content {
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
    margin-top: 15px;
}

/* CARD */
.card {
    background: var(--card);
    border-radius: 14px;
    padding: 15px;
    border: 1px solid var(--border);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.thumb {
    height: 90px;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: white;
    margin-bottom: 10px;
}

.card b {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
}

.card a {
    display: inline-block;
    margin: 3px;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    background: var(--primary);
    color: white;
    text-decoration: none;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    opacity: 0.6;
}

/* MOBILE */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar" id="sidebar">
    <h2>📁 <span>Sysmart</span></h2>

    <div class="menu">
        <div onclick="filtrarTipo('todos')"><i class="fas fa-layer-group"></i> <span>Todos</span></div>
        <div onclick="filtrarTipo('pdf')"><i class="fas fa-file-pdf"></i> <span>PDFs</span></div>
        <div onclick="filtrarTipo('script')"><i class="fas fa-code"></i> <span>Scripts</span></div>
        <div onclick="filtrarTipo('python')"><i class="fab fa-python"></i> <span>Python</span></div>
    </div>

    <br>

    <div class="menu">
        <div onclick="toggleSidebar()"><i class="fas fa-bars"></i> <span>Menu</span></div>
        <div onclick="toggleDark()"><i class="fas fa-moon"></i> <span>Dark</span></div>
    </div>
</div>

<div class="main">

<div class="header">
    <h1>📄 Manual Sysmart</h1>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="busca" placeholder="Pesquisar..." onkeyup="buscar()">
    </div>
</div>

<div class="content" id="conteudo">
    <p>Carregando arquivos...</p>
</div>

<div class="footer">
    © 2026 Sysmart Sistemas
</div>

</div>
</div>

<script>
let dados = { pdf: [], script: [], python: [] };
let filtro = 'todos';
let termoBusca = '';

const urls = {
    pdf: "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/pdf",
    script: "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/script",
    python: "https://api.github.com/repos/Sysmart-sistemas/Base_de_conhecimento_Sysmart/contents/static/projeto_em_python"
};

function escapeHTML(str) {
    return str.replace(/[&<>"']/g, tag => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[tag]));
}

async function carregar() {
    try {
        const promises = Object.entries(urls).map(async ([tipo, url]) => {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            dados[tipo] = await res.json();
        });

        await Promise.all(promises);
        render();
    } catch {
        document.getElementById('conteudo').innerHTML =
            `<p>Erro ao carregar dados 😢</p>`;
    }
}

function criarCard(icone, nome, links) {
    return `
    <div class="card">
        <div class="thumb">${icone}</div>
        <b>${escapeHTML(nome)}</b>
        ${links.join('')}
    </div>`;
}

function render() {
    let html = '';

    const filtrar = (lista) =>
        lista.filter(f => f.name.toLowerCase().includes(termoBusca));

    if (filtro === 'todos' || filtro === 'pdf') {
        html += `<h2>📄 PDFs</h2><div class="grid">`;
        filtrar(dados.pdf).forEach(f => {
            html += criarCard("📄", f.name, [
                `<a href="${f.download_url}" target="_blank">Download</a>`,
                `<a href="https://docs.google.com/gview?url=${encodeURIComponent(f.download_url)}&embedded=true" target="_blank">Ver</a>`
            ]);
        });
        html += `</div>`;
    }

    if (filtro === 'todos' || filtro === 'script') {
        html += `<h2>💻 Scripts</h2><div class="grid">`;
        filtrar(dados.script).forEach(f => {
            html += criarCard("💻", f.name, [
                `<a href="${f.download_url}" target="_blank">Download</a>`
            ]);
        });
        html += `</div>`;
    }

    if (filtro === 'todos' || filtro === 'python') {
        html += `<h2>🐍 Python</h2><div class="grid">`;
        filtrar(dados.python).forEach(f => {
            html += criarCard("🐍", f.name, [
                `<a href="${f.html_url}" target="_blank">Abrir</a>`
            ]);
        });
        html += `</div>`;
    }

    if (!html) {
        html = `<p>Nenhum resultado encontrado 😕</p>`;
    }

    document.getElementById('conteudo').innerHTML = html;
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

let timeout;
function buscar() {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        termoBusca = document.getElementById('busca').value.toLowerCase();
        render();
    }, 300);
}

function filtrarTipo(tipo) {
    filtro = tipo;
    render();
}

function toggleDark() {
    document.body.classList.toggle('dark');
    localStorage.setItem('dark', document.body.classList.contains('dark'));
}

if (localStorage.getItem('dark') === 'true') {
    document.body.classList.add('dark');
}

carregar();
</script>

</body>
</html>
